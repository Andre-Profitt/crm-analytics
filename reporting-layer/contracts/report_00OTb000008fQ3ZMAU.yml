      Reports API rejects with specificErrorCode 113).
    - sort_aggregate on grouping is PATCH-only, not POST-settable.
    - Do not set description or folderId on POST — triggers HTTP 500
      "invalid parameter value". Apply via PATCH after creation.

  hash:
