name: Track E — contract validators

# Pull-request consumer of the reusable release-gates workflow
# (.github/workflows/reusable-release-gates.yml). Triggers whenever any
# release-pipeline contract / validator / orchestrator / test / fixture
# changes. Live-anchor tests skip themselves when the live workbook +
# PPTX (in ~/Downloads/, not committed) are absent.
#
# Refactored under Track L: the validator + test job logic now lives in
# a reusable workflow + two composite actions so PR / nightly / monthly
# consumers all funnel through the same gate definition.

"on":
  pull_request:
    paths:
      - "config/deck_contract.yaml"
      - "config/director_workbook_contract.yaml"
      - "schemas/deck_contract.schema.json"
      - "schemas/director_workbook_contract.schema.json"
      - "scripts/monthly_platform/deck_contract.py"
      - "scripts/monthly_platform/director_workbook_contract.py"
      - "scripts/monthly_platform/deck_binding_resolver.py"
      - "scripts/monthly_platform/brand_contract.py"
      - "scripts/validate_deck_contract.py"
      - "scripts/validate_track_e_workbook_contract.py"
      - "scripts/validate_track_e_workbook.py"
      - "scripts/validate_deck_bindings.py"
      - "scripts/validate_director_monthly_pptx.py"
      - "scripts/validate_deck_brand.py"
      - "scripts/validate_deck_render.py"
      - "scripts/validate_deck_visual_regression.py"
      - "scripts/render_deck_to_images.py"
      - "scripts/build_release_packet.py"
      - "scripts/build_release_catalog.py"
      - "scripts/monthly_platform/release_catalog.py"
      - "scripts/monthly_platform/waivers.py"
      - "scripts/monthly_platform/lineage.py"
      - "config/deck_visual_regions.yaml"
      - "config/release_policy.yaml"
      - "config/waivers/**"
      - "tests/fixtures/track_f/**"
      - "tests/test_track_g_*.py"
      - "tests/test_track_k_*.py"
      - "tests/test_track_em2_*.py"
      - "tests/test_track_j_*.py"
      - "assets/SimCorp_PPT_Template.pptx"
      - "tests/test_track_e_*.py"
      - "tests/test_track_f_*.py"
      - ".github/workflows/track-e-validators.yml"
      - ".github/workflows/reusable-release-gates.yml"
      - ".github/actions/setup-crm-analytics/**"
      - ".github/actions/run-release-gates/**"
  workflow_dispatch:

jobs:
  release-gates:
    uses: ./.github/workflows/reusable-release-gates.yml
    with:
      python-version: "3.13"
