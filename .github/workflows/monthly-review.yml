name: Sales Director Monthly Review — Source-Backed Auto Build

# Track A cutover (2026-04-25): scheduled runs now invoke the source-backed
# pipeline (scripts/run_source_backed_monthly_pipeline.py) with an explicit
# snapshot date. The legacy lane (scripts/run_monthly_director_review.py)
# is reachable only via workflow_dispatch with legacy_only=true.
#
# Snapshot date resolution policy:
#   schedule  → last day of prior month (NOT "today"). Fires Apr 1 → snapshot = Mar 31.
#   dispatch  → user-supplied input.snapshot_date is required; no implicit default.
# This closes the GPT Pro hazard where running cron on a different day silently
# shifted business scope.

on:
  schedule:
    # 1st of every month at midnight UTC. Snapshot is computed as the last day
    # of the prior month so the run captures month-end final state regardless
    # of when the cron actually fires.
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: "Snapshot date (YYYY-MM-DD). REQUIRED — no implicit default."
        required: true
        type: string
      run_id:
        description: "Run ID label. Blank = auto (monthly-dispatch-<date>-<attempt>)."
        required: false
        default: ""
        type: string
      legacy_only:
        description: "Fall back to legacy run_monthly_director_review path (off by default)."
        required: false
        default: false
        type: boolean

env:
  SF_TARGET_ORG: apro@simcorp.com
  PYTHON_VERSION: "3.13"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --set-default --alias prod

      - name: Authenticate to Azure (Microsoft Graph for SharePoint upload stage)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none

      - name: Resolve snapshot date
        id: date
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Cron path: snapshot = last day of prior month. NOT today.
            SNAPSHOT_DATE=$(python3 -c "from datetime import date, timedelta; first_of_this_month = date.today().replace(day=1); print((first_of_this_month - timedelta(days=1)).isoformat())")
          else
            SNAPSHOT_DATE="${{ inputs.snapshot_date }}"
          fi
          if [ -z "$SNAPSHOT_DATE" ]; then
            echo "::error::snapshot_date must be provided (workflow_dispatch) or computed (schedule)"
            exit 1
          fi
          echo "snapshot_date=$SNAPSHOT_DATE" >> $GITHUB_OUTPUT
          echo "Resolved snapshot date: $SNAPSHOT_DATE"

      - name: Resolve run id
        id: runid
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            RUN_ID="${{ inputs.run_id }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            RUN_ID="monthly-cron-${{ steps.date.outputs.snapshot_date }}-${{ github.run_attempt }}"
          else
            RUN_ID="monthly-dispatch-${{ steps.date.outputs.snapshot_date }}-${{ github.run_attempt }}"
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Resolved run id: $RUN_ID"

      - name: Run source-backed monthly pipeline
        if: ${{ inputs.legacy_only != 'true' }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          python3 scripts/run_source_backed_monthly_pipeline.py \
            --snapshot-date "${{ steps.date.outputs.snapshot_date }}" \
            --run-id "${{ steps.runid.outputs.run_id }}"

      - name: Run legacy lane (fallback only)
        if: ${{ inputs.legacy_only == 'true' }}
        run: |
          echo "::warning::Running LEGACY lane via run_monthly_director_review.py — only valid for explicit fallback dispatches."
          python3 scripts/run_monthly_director_review.py \
            --date "${{ steps.date.outputs.snapshot_date }}"
          python3 scripts/audit_data_quality.py \
            --date "${{ steps.date.outputs.snapshot_date }}"
          python3 scripts/audit_deck_scope.py \
            --date "${{ steps.date.outputs.snapshot_date }}"
          grep -q '"mismatches": 0' obsidian/Monthly/$(echo "${{ steps.date.outputs.snapshot_date }}" | cut -c1-7)/tie-out.md \
            && echo "✓ Legacy tie-out clean" \
            || (echo "✗ Legacy tie-out has mismatches" && exit 1)

      - name: Upload source-backed run artifacts
        if: ${{ inputs.legacy_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-source-backed-${{ steps.date.outputs.snapshot_date }}-${{ steps.runid.outputs.run_id }}
          path: |
            output/source_backed_monthly_pipeline_runs/${{ steps.date.outputs.snapshot_date }}/${{ steps.runid.outputs.run_id }}/
            output/monthly_review_release_packets/${{ steps.date.outputs.snapshot_date }}/${{ steps.runid.outputs.run_id }}/
            output/source_backed_decks/${{ steps.date.outputs.snapshot_date }}/${{ steps.runid.outputs.run_id }}/
            output/monthly_director_bundles_from_sources/${{ steps.date.outputs.snapshot_date }}/${{ steps.runid.outputs.run_id }}/
            output/thinkcell_source_from_bundles/${{ steps.date.outputs.snapshot_date }}/${{ steps.runid.outputs.run_id }}/
            output/source_backed_release_bundles/${{ steps.date.outputs.snapshot_date }}/${{ steps.runid.outputs.run_id }}/
          retention-days: 90

      - name: Upload legacy lane artifacts (fallback only)
        if: ${{ inputs.legacy_only == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-legacy-${{ steps.date.outputs.snapshot_date }}
          path: |
            output/simcorp_director_decks/${{ steps.date.outputs.snapshot_date }}/land-only/*.pptx
            output/sharepoint/*.xlsx
            output/data_quality/${{ steps.date.outputs.snapshot_date }}/
            obsidian/Monthly/
          retention-days: 90
