name: Set up CRM Analytics
description: >-
  Composite action that checks out the repository (optional), pins Python,
  caches pip downloads, and installs runtime + test dependencies. Used by
  every release-pipeline workflow so dependency drift cannot diverge across
  PR / nightly / scheduled lanes.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"
  do-checkout:
    description: >-
      Whether to run actions/checkout. Set to "false" if the caller has
      already checked out (composite actions can run after checkout).
    required: false
    default: "true"
  pip-extra-packages:
    description: >-
      Extra pip packages to install on top of requirements.txt. Defaults to
      the test-only deps the validators need (pytest, jsonschema, Pillow).
      Override to extend; do not override to remove.
    required: false
    default: "pytest pytest-asyncio jsonschema Pillow"

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.do-checkout == 'true' }}
      uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # requirements.txt covers runtime deps (pydantic, pyyaml,
        # openpyxl, python-pptx). The validators + tests also need
        # jsonschema, Pillow (Track F F6 image diffs), and pytest;
        # install those explicitly here so this action is self-contained
        # and doesn't depend on a separate dev-requirements file.
        pip install ${{ inputs.pip-extra-packages }}
