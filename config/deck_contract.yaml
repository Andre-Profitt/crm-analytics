schema_version: monthly_platform.deck_contract.v2
brand:
  template: assets/SimCorp_PPT_Template.pptx
  expected_template_sha256: 7834561e83403c4c2f7b1150953a860c23c8e1caf81ef3c7f2fefb0446514195
  expected_template_size_bytes: 9058051
  theme:
    fonts:
      heading: SimCorp Sans
      body: SimCorp Sans
    colors:
      navy: '#011946'
      primary_blue: '#0E3788'
      rich_blue: '#094FB2'
      aqua: '#6FCCDD'
      aqua_light: '#CBF5F3'
      light_blue_panel: '#E6EEFE'
      light_panel: '#F5F8FD'
      magenta: '#9D2E7B'
      grey_text: '#5C7482'
      divider_grey: '#D7E2E8'
      amber: '#FB9B2A'
      green: '#188A73'
      white: '#FFFFFF'
  expected_slide_master_count: 1
  required_layouts:
  - Title 1
  - Title and Content
  - 2 x content w/ gradient line
  - 4 x content w/ gradient line
  - End slide with disclaimer 1
director_profiles:
  source: config/sales_director_md1_presets.json
  required_count: 9
  required_fields:
  - director
  - territory
  - region
  - salesforce_filters
  - output_slug
data_sources:
  director_workbook:
    type: excel_workbook
    contract: config/director_workbook_contract.yaml
    description: APAC pilot pattern — 13-sheet live director workbook produced upstream of the deck builder by the cadence
      pipeline.
    required_sheets:
    - Summary
    - Pipeline Open FY26
    - Won Lost FY26
    - Commercial Approval
    - Renewals FY26
    - Pipeline Inspection
    - Activity Volume
    - Commit Items
    - Q1 Movement
    - Stage History
    - Forecast Category History
    - Q1 Snapshot Trend
    - Q2 Snapshot Trend
  warehouse:
    type: parquet_warehouse
    description: v20d ETL spine warehouse (Track I). Referenced for cross-checks (source readiness on cover); not the primary
      feed in M1.
    required_marts:
    - mart_source_run_summary
    - mart_director_source_health
    - staged_source_quality_findings
    - staged_distribution_findings
profiles:
  director_monthly:
    status: active
    priority: primary_release_artifact
    builder_lineage: scripts/build_sd_monthly_deck_v2.py
    anchor_artifact: output/simcorp_director_decks/2026-04-20/land-only/jesper-tyrer-LAND.pptx
    anchor_workbook: output/director_live_workbooks/2026-04-20/jesper-tyrer.xlsx
    expected_slide_count: 16
    layout: simcorp_director_monthly
    run_metadata:
      presentation_month: 2026-04
      snapshot_date: '2026-04-22'
      prior_snapshot_date: '2026-04-20'
      analysis_scope: Q1-Q3 FY26
    slides:
    - id: cover
      slide_number: 1
      title: Sales Director Monthly Pipeline Review
      purpose: Cover — director identity, territory, scope, snapshot.
      layout: cover
      required_takeaway:
        required: false
      required_source_notes:
      - snapshot_date
      - territory
      - analysis_scope
    - id: executive_summary
      slide_number: 2
      title: Executive Summary
      purpose: KPI cards + narrative bullets for the director's headline numbers.
      layout: kpi_cards
      required_takeaway:
        required: true
        max_chars: 220
        template: '{territory}: {open_arr_unweighted_eur} open ({open_arr_weighted_eur} weighted) across {open_deal_count}
          deals.'
        required_metrics:
        - open_arr_unweighted
        - open_arr_weighted
        - open_deal_count
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: open
        start: '2026-04-01'
        end: '2026-09-30'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
    - id: since_last_review
      slide_number: 3
      title: Since Last Review
      purpose: Movement table — what changed between prior_snapshot_date and snapshot_date.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 150
        template: 'Since {prior_snapshot_date}: {net_movement_eur} net change across {movement_event_count} events.'
        required_metrics:
        - net_movement_eur
        - movement_event_count
      required_source_notes:
      - movement_window
      - snapshot_date
      movement_window:
        from: ${prior_snapshot_date}
        to: ${snapshot_date}
      tables:
      - id: tbl_since_last_review
        source: director_workbook
        sheet: Q1 Movement
        max_rows: 12
        sort:
        - field: Changed On
          order: desc
        columns:
        - id: metric
          header: Metric
          computed: bucket_label
        - id: prior_snapshot
          header: Prior Snapshot
          computed: bucket_label
        - id: current_snapshot
          header: Current Snapshot
          computed: bucket_label
        - id: change
          header: Change
          computed: bucket_arr_impact
        header_pattern_sets:
        - - Metric
          - \d{4}-\d{2}-\d{2}
          - \d{4}-\d{2}-\d{2}
          - Change
    - id: q1_promised_delivered
      slide_number: 4
      title: Q1 Promised vs Delivered
      purpose: KPI cards comparing Q1 opening pipeline to Q1 closed outcome.
      layout: kpi_cards
      required_takeaway:
        required: true
        max_chars: 200
        template: 'Q1 opened at {q1_opening_arr_eur} across {q1_opening_deal_count} deals. Committed (stage 4+): {q1_committed_arr_eur}.'
        required_metrics:
        - q1_opening_arr
        - q1_opening_deal_count
        - q1_committed_arr
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: q1
        start: '2026-01-01'
        end: '2026-03-31'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: q1_historical_snapshot
      definition: opening_pipeline
    - id: q1_loss_drivers
      slide_number: 5
      title: Q1 Loss Drivers
      purpose: Two tables — loss reason breakdown + stage reached for losses.
      layout: dual_table
      required_takeaway:
        required: true
        max_chars: 150
        template: '{q1_loss_count} Q1 Land losses, {q1_loss_arr_eur}. {q1_losses_missing_reason} missing reason code.'
        required_metrics:
        - q1_loss_count
        - q1_loss_arr
        - q1_losses_missing_reason
      required_source_notes:
      - snapshot_date
      - territory
      - period
      period:
        role: q1
        start: '2026-01-01'
        end: '2026-03-31'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: q1_historical_snapshot
      definition: closed_outcome
      tables:
      - id: tbl_q1_loss_reasons
        source: director_workbook
        sheet: Won Lost FY26
        filters:
          Type: Land
          Stage: Closed Lost
          Close Date:
            period: q1
        max_rows: 10
        sort:
        - field: ARR Unweighted (EUR)
          order: desc
        columns:
        - id: reason
          header: Loss Reason
          source_column: Reason
        - id: count
          header: Count
          computed: row_count
        - id: arr
          header: Lost ARR
          source_column: ARR Unweighted (EUR)
          aggregation: sum
          format: eur_compact
      - id: tbl_q1_loss_stage_reached
        source: director_workbook
        sheet: Won Lost FY26
        filters:
          Type: Land
          Stage: Closed Lost
          Close Date:
            period: q1
        max_rows: 10
        columns:
        - id: stage
          header: Stage Reached Before Loss
          source_column: Stage
        - id: count
          header: Count
          computed: row_count
        - id: arr
          header: Lost ARR
          source_column: ARR Unweighted (EUR)
          aggregation: sum
          format: eur_compact
    - id: q2_outlook
      slide_number: 6
      title: Q2 Outlook
      purpose: KPI cards for Q2 book — unweighted, weighted, deal count.
      layout: kpi_cards
      required_takeaway:
        required: true
        max_chars: 200
        template: Q2 book {q2_open_arr_unweighted_eur} unweighted, {q2_open_arr_weighted_eur} weighted. {q2_open_deal_count}
          deals closing Apr-Jun.
        required_metrics:
        - q2_open_arr_unweighted
        - q2_open_arr_weighted
        - q2_open_deal_count
      required_source_notes:
      - snapshot_date
      - territory
      - period
      period:
        role: q2
        start: '2026-04-01'
        end: '2026-06-30'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
    - id: top_open_opportunities
      slide_number: 7
      title: Top Open Opportunities
      purpose: Top-N open Land deals by unweighted ARR.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 180
        template: Top {top_n} open deals = {top_n_arr_eur}. {top_account} leads at {top_account_arr_eur}; top 5 = {top_5_share_pct}
          of this book.
        required_metrics:
        - top_n
        - top_n_arr
        - top_account
        - top_account_arr
        - top_5_share_pct
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: open
        start: '2026-04-01'
        end: '2026-09-30'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
      tables:
      - id: tbl_top_open_opportunities
        source: director_workbook
        sheet: Pipeline Open FY26
        filters:
          Type: Land
        max_rows: 7
        sort:
        - field: ARR Unweighted (EUR)
          order: desc
        columns:
        - id: account
          header: Account
          source_column: Account
          max_chars: 28
        - id: opportunity
          header: Opportunity
          source_column: Opportunity
          max_chars: 32
        - id: owner
          header: Owner
          source_column: Owner
        - id: stage
          header: Stage
          source_column: Stage
        - id: close_date
          header: Close Date
          source_column: Close Date
          format: yyyy_mm_dd
        - id: age
          header: Age
          computed: days_to_close
        - id: arr
          header: ARR (mEUR)
          source_column: ARR Unweighted (EUR)
          format: eur_compact
        - id: arr_wtd
          header: ARR Wtd (mEUR)
          source_column: ARR Weighted (EUR)
          format: eur_compact
    - id: deal_risk_triage
      slide_number: 8
      title: Deal Risk Triage
      purpose: Top Q2-Q3 deals at risk by Pipeline Inspection score/priority.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 150
        template: Top {risk_top_n} Q2-Q3 deals at risk, {risk_arr_eur} exposed.
        required_metrics:
        - risk_top_n
        - risk_arr
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: q2_q3
        start: '2026-04-01'
        end: '2026-09-30'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
      tables:
      - id: tbl_deal_risk_triage
        source: director_workbook
        sheet: Pipeline Inspection
        filters:
          Close Date:
            period: q2_q3
        max_rows: 6
        sort:
        - field: Score
          order: desc
        - field: ARR Weighted (EUR)
          order: desc
        columns:
        - id: rank
          header: '#'
          computed: row_count
        - id: score
          header: Score
          source_column: Score
        - id: account
          header: Account
          source_column: Opportunity
          max_chars: 28
        - id: opportunity
          header: Opportunity
          source_column: Opportunity
          max_chars: 32
        - id: stage
          header: Stage
          source_column: Stage
        - id: close
          header: Close
          source_column: Close Date
          format: yyyy_mm_dd
        - id: arr
          header: ARR (mEUR)
          source_column: ARR Weighted (EUR)
          format: eur_compact
        - id: reasons
          header: Reasons
          computed: readiness_status
    - id: owner_coaching
      slide_number: 9
      title: Owner Coaching Priorities
      purpose: Owner-level rollup of pushes + open ARR for coaching priorities.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 150
        template: '{coach_owner_count} owners carry {coach_total_pushes} pushes across {coach_total_arr_eur}. Coach in this
          order.'
        required_metrics:
        - coach_owner_count
        - coach_total_pushes
        - coach_total_arr
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: open
        start: '2026-04-01'
        end: '2026-09-30'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
      tables:
      - id: tbl_owner_coaching
        source: director_workbook
        sheet: Pipeline Open FY26
        filters:
          Type: Land
        group_by: Owner
        max_rows: 8
        sort:
        - field: Push Count
          order: desc
          aggregation: sum
        - field: ARR Unweighted (EUR)
          order: desc
          aggregation: sum
        columns:
        - id: owner
          header: Owner
          source_column: Owner
        - id: deals
          header: Deals
          computed: row_count
        - id: open_arr
          header: Open ARR
          source_column: ARR Unweighted (EUR)
          aggregation: sum
          format: eur_compact
        - id: pushes
          header: Pushes
          source_column: Push Count
          aggregation: sum
        - id: top_risk_signals
          header: Top Risk Signals
          computed: readiness_status
        - id: coaching_focus
          header: Coaching Focus
          computed: readiness_status
    - id: pushed_deals
      slide_number: 10
      title: Pushed Deals
      purpose: Pushed-deal headline + Salesforce link for live drill.
      layout: kpi_cards_with_link
      required_takeaway:
        required: true
        max_chars: 180
        template: '{pushed_deal_count} open deals pushed. {pushed_top_owner} owns {pushed_top_owner_count} of the most-pushed
          deals; pattern review.'
        required_metrics:
        - pushed_deal_count
        - pushed_top_owner
        - pushed_top_owner_count
      required_source_notes:
      - snapshot_date
      - territory
      - salesforce_drill_link
      required_links:
      - id: salesforce_pushed_deals
        label: Open in Salesforce
        kind: salesforce_list_view
    - id: q1_slippage
      slide_number: 11
      title: Q1 Slippage
      purpose: Deals that slipped out of Q1 + their post-slip behavior.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 150
        template: '{slipped_deal_count} deals slipped out of Q1 ({slipped_arr_eur}). {pushed_since_count} pushed since.'
        required_metrics:
        - slipped_deal_count
        - slipped_arr
        - pushed_since_count
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: q1
        start: '2026-01-01'
        end: '2026-03-31'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: q1_original_close_date
      definition: historical_trending_delta
      tables:
      - id: tbl_q1_slippage
        source: director_workbook
        sheet: Q1 Movement
        filters:
          Movement:
            in:
            - Push
            - Slip
        max_rows: 12
        sort:
        - field: ARR Unweighted (EUR)
          order: desc
        columns:
        - id: account
          header: Account
          source_column: Account
          max_chars: 24
        - id: opportunity
          header: Opportunity
          source_column: Opportunity
          max_chars: 28
        - id: movement
          header: Movement
          source_column: Movement
        - id: old_close
          header: Old Close
          source_column: Old Close
          format: yyyy_mm_dd
        - id: new_close
          header: New Close
          source_column: New Close
          format: yyyy_mm_dd
        - id: changed
          header: Changed
          source_column: Changed On
          format: yyyy_mm_dd
        - id: arr
          header: ARR (mEUR)
          source_column: ARR Unweighted (EUR)
          format: eur_compact
    - id: forecast_accuracy
      slide_number: 12
      title: Forecast Accuracy
      purpose: KPI cards comparing forecast commitments to closed outcomes.
      layout: kpi_cards
      required_takeaway:
        required: true
        max_chars: 150
        template: '{closed_won_count} {closed_won_unit} closed-won ({closed_won_arr_eur}).'
        required_metrics:
        - closed_won_count
        - closed_won_unit
        - closed_won_arr
      required_source_notes:
      - snapshot_date
      - territory
      - period
      period:
        role: q1
        start: '2026-01-01'
        end: '2026-03-31'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: q1_historical_snapshot
      definition: closed_outcome
    - id: forecast_mix
      slide_number: 13
      title: Forecast Mix
      purpose: Open Land pipeline by forecast category.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 180
        template: 'Forecast mix: {forecast_mix_total_arr_eur} across {forecast_mix_deal_count} open deals. Commit = {forecast_commit_arr_eur}
          ({forecast_commit_pct}).'
        required_metrics:
        - forecast_mix_total_arr
        - forecast_mix_deal_count
        - forecast_commit_arr
        - forecast_commit_pct
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: open
        start: '2026-04-01'
        end: '2026-09-30'
      population:
        type: Land
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
      tables:
      - id: tbl_forecast_mix
        source: director_workbook
        sheet: Commit Items
        group_by: Forecast Category
        max_rows: 8
        sort:
        - field: Forecast ARR Wtd (EUR)
          order: desc
          aggregation: sum
        columns:
        - id: category
          header: Category
          source_column: Forecast Category
        - id: deals
          header: Deals
          computed: row_count
        - id: arr
          header: ARR (mEUR)
          source_column: Forecast ARR Wtd (EUR)
          aggregation: sum
          format: eur_compact
    - id: commercial_approvals
      slide_number: 14
      title: Commercial Approvals
      purpose: Approval status — distinguish approved-2026, pending approval, candidate.
      layout: quad_table
      required_takeaway:
        required: true
        max_chars: 180
        template: '{approved_2026_count} approved 2026; {pending_approval_count} pending; {candidate_count} candidate.'
        required_metrics:
        - approved_2026_count
        - pending_approval_count
        - candidate_count
      required_source_notes:
      - snapshot_date
      - territory
      tables:
      - id: tbl_approvals_approved_2026
        source: director_workbook
        sheet: Commercial Approval
        filters:
          Status: Approved 2026
        max_rows: 5
        columns:
        - id: region
          header: Region
          source_column: Lead Scope
        - id: approval_count
          header: '# Approvals'
          computed: row_count
        - id: avg_deal_size
          header: Avg Deal Size (mEUR ARR)*
          source_column: ARR Unweighted (EUR)
          aggregation: mean
          format: eur_compact
        - id: actual_coverage
          header: Actual Deal ARR Coverage (mEUR)
          source_column: ARR Unweighted (EUR)
          aggregation: sum
          format: eur_compact
      - id: tbl_approvals_pending
        source: director_workbook
        sheet: Commercial Approval
        filters:
          Status: Pending Approval
        max_rows: 5
        columns:
        - id: region
          header: Region
          source_column: Lead Scope
        - id: approval_count
          header: '# Approvals'
          computed: row_count
        - id: avg_deal_size
          header: Avg Deal Size
          source_column: ARR Unweighted (EUR)
          aggregation: mean
          format: eur_compact
        - id: actual_coverage
          header: Actual Deal ARR Coverage (mEUR)
          source_column: ARR Unweighted (EUR)
          aggregation: sum
          format: eur_compact
      - id: tbl_approvals_candidate
        source: director_workbook
        sheet: Commercial Approval
        filters:
          Status: Candidate
        max_rows: 5
        columns:
        - id: opportunity
          header: Opportunity Name
          source_column: Opportunity
          max_chars: 32
        - id: deal_size
          header: Deal size (mEUR)
          source_column: ARR Unweighted (EUR)
          format: eur_compact
        - id: approved_subject_to
          header: Approved subject to
          source_column: Next Step
          max_chars: 36
      - id: tbl_approvals_other
        source: director_workbook
        sheet: Commercial Approval
        filters:
          Status:
            not_in:
            - Approved 2026
            - Pending Approval
            - Candidate
        max_rows: 5
        columns:
        - id: opportunity
          header: Opportunity Name
          source_column: Opportunity
          max_chars: 32
        - id: arr
          header: ARR (mEUR)
          source_column: ARR Unweighted (EUR)
          format: eur_compact
    - id: renewals
      slide_number: 15
      title: FY26 Renewals
      purpose: FY26 renewal exposure by close date.
      layout: table_with_takeaway
      required_takeaway:
        required: true
        max_chars: 180
        template: '{renewal_count} renewals due FY26, {renewal_acv_eur} ACV ({renewal_q2_count} in Q2, {renewal_q3_count}
          in Q3).'
        required_metrics:
        - renewal_count
        - renewal_acv
        - renewal_q2_count
        - renewal_q3_count
      required_source_notes:
      - snapshot_date
      - territory
      period:
        role: fy26
        start: '2026-01-01'
        end: '2026-12-31'
      population:
        type: Renewal
        territory: ${territory}
        close_date_scope: current_close_date
      definition: final_open_pipeline
      tables:
      - id: tbl_renewals
        source: director_workbook
        sheet: Renewals FY26
        max_rows: 8
        sort:
        - field: Close Date
          order: asc
        columns:
        - id: close
          header: Close Date
          source_column: Close Date
          format: yyyy_mm_dd
        - id: account
          header: Account
          source_column: Account
          max_chars: 24
        - id: opportunity
          header: Opportunity
          source_column: Opportunity
          max_chars: 28
        - id: owner
          header: Owner
          source_column: Owner
        - id: stage
          header: Stage
          source_column: Stage
        - id: acv
          header: ACV (EUR)
          source_column: ACV Unweighted (EUR)
          format: eur_compact
        - id: probability
          header: Probability
          source_column: Probability %
        - id: commentary
          header: Commentary
          source_column: Comments
          max_chars: 36
    - id: legal_notice
      slide_number: 16
      title: Legal Notice
      purpose: Static SimCorp legal disclaimer slide.
      layout: legal
      required_takeaway:
        required: false
      required_source_notes: []
      static: true
  control_deck:
    status: deferred
    priority: internal_control_artifact
    builder_lineage: scripts/build_source_backed_deck.py
    expected_slide_count: 6
    note: 'The 6-slide source-backed control deck (the previous Track E target).

      Reading B confirmed (2026-04-26): defer this profile to a later

      milestone after director_monthly is solid. The control deck is an

      ETL trust artifact, not a stakeholder deliverable.

      '
