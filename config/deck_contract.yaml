# Track E — Deck Contract (Milestone 1, retargeted to director_monthly)
#
# Single source of truth for the director-facing Sales Director Monthly
# review deck. Anchored against:
#   - jesper-tyrer-LAND.pptx (2026-04-20 APAC, Rebekka-aligned, v2->v13 chain)
#   - jesper-tyrer-2026-04-20.xlsx (13-sheet APAC live director workbook)
#   - build_sd_monthly_deck_v2.py builder lineage
#
# Reading B confirmed by GPT 2026-04-26: govern the stakeholder-facing
# director deck FIRST. The 6-slide source-backed control deck is
# declared as profiles.control_deck with status: deferred.
#
# Hard NO-GOs in this milestone (preserved from the original Track E
# scope, see docs/2026-04-26-track-e-deck-contract-design.md):
#   - No edits to build_sd_monthly_deck_v2.py or any build_*.py.
#   - No template-first builder (Track F).
#   - No render/visual regression gates (Track F).
#   - No release catalog or waivers (Track K).
#   - No OpenLineage events (Track J).

schema_version: monthly_platform.deck_contract.v2

# ----------------------------------------------------------------------
# Brand block (preserved from M1 scaffold; SHA computed 2026-04-26)
# ----------------------------------------------------------------------
brand:
  template: assets/SimCorp_PPT_Template.pptx
  expected_template_sha256: 7834561e83403c4c2f7b1150953a860c23c8e1caf81ef3c7f2fefb0446514195
  expected_template_size_bytes: 9058051
  theme:
    fonts:
      heading: SimCorp Sans
      body: SimCorp Sans
    colors:
      navy: "#011946"
      primary_blue: "#0E3788"
      rich_blue: "#094FB2"
      aqua: "#6FCCDD"
      aqua_light: "#CBF5F3"
      light_blue_panel: "#E6EEFE"
      light_panel: "#F5F8FD"
      magenta: "#9D2E7B"
      grey_text: "#5C7482"
      divider_grey: "#D7E2E8"
      amber: "#FB9B2A"
      green: "#188A73"
      white: "#FFFFFF"

# ----------------------------------------------------------------------
# Director profiles registry — operational presets stay external.
# ----------------------------------------------------------------------
director_profiles:
  source: config/sales_director_md1_presets.json
  required_count: 9
  required_fields:
    - director
    - territory
    - region
    - salesforce_filters
    - output_slug

# ----------------------------------------------------------------------
# Data sources the deck profiles can bind to.
# ----------------------------------------------------------------------
data_sources:
  director_workbook:
    type: excel_workbook
    contract: config/director_workbook_contract.yaml
    description: APAC pilot pattern — 13-sheet live director workbook produced upstream of the deck builder by the cadence pipeline.
    required_sheets:
      - Summary
      - Pipeline Open FY26
      - Won Lost FY26
      - Commercial Approval
      - Renewals FY26
      - Pipeline Inspection
      - Activity Volume
      - Commit Items
      - Q1 Movement
      - Stage History
      - Forecast Category History
      - Q1 Snapshot Trend
      - Q2 Snapshot Trend
  warehouse:
    type: parquet_warehouse
    description: v20d ETL spine warehouse (Track I). Referenced for cross-checks (source readiness on cover); not the primary feed in M1.
    required_marts:
      - mart_source_run_summary
      - mart_director_source_health
      - staged_source_quality_findings
      - staged_distribution_findings

# ----------------------------------------------------------------------
# Deck profiles. director_monthly is active and primary; control_deck is
# declared but deferred (the 6-slide source-backed control deck).
# ----------------------------------------------------------------------
profiles:
  director_monthly:
    status: active
    priority: primary_release_artifact
    builder_lineage: scripts/build_sd_monthly_deck_v2.py
    anchor_artifact: output/simcorp_director_decks/2026-04-20/land-only/jesper-tyrer-LAND.pptx
    anchor_workbook: output/director_live_workbooks/2026-04-20/jesper-tyrer.xlsx
    expected_slide_count: 18
    layout: simcorp_director_monthly

    # Run metadata — set by the cadence runner; the validator requires
    # presentation_month, snapshot_date, prior_snapshot_date, and
    # analysis_scope to be populated for any released deck.
    run_metadata:
      presentation_month: "2026-04"
      snapshot_date: "2026-04-22"
      prior_snapshot_date: "2026-04-20"
      analysis_scope: "Q1-Q3 FY26"

    # 18 stable slide IDs verified against jesper-tyrer-LAND.pptx
    # (2026-04-26: 18 slides, table counts match this registry).
    slides:
      - id: cover
        slide_number: 1
        title: Sales Director Monthly Pipeline Review
        purpose: Cover — director identity, territory, scope, snapshot.
        layout: cover
        required_takeaway:
          required: false
        required_source_notes: [snapshot_date, territory, analysis_scope]

      - id: executive_summary
        slide_number: 2
        title: Executive Summary
        legacy_title_patterns:
          - "^Pipeline EUR.* (un)?weighted.*deals.*$"
        purpose: KPI cards + narrative bullets for the director's headline numbers.
        layout: kpi_cards
        required_takeaway:
          required: true
          max_chars: 220
          template: "{territory}: {open_arr_unweighted_eur} open ({open_arr_weighted_eur} weighted) across {open_deal_count} deals."
          required_metrics:
            [open_arr_unweighted, open_arr_weighted, open_deal_count]
        required_source_notes: [snapshot_date, territory]
        period: { role: open, start: "2026-04-01", end: "2026-09-30" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: current_close_date,
          }
        definition: final_open_pipeline

      - id: since_last_review
        slide_number: 3
        title: Since Last Review
        legacy_title_patterns:
          - "^Since last review.*$"
        purpose: Movement table — what changed between prior_snapshot_date and snapshot_date.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 150
          template: "Since {prior_snapshot_date}: {net_movement_eur} net change across {movement_event_count} events."
          required_metrics: [net_movement_eur, movement_event_count]
        required_source_notes: [movement_window, snapshot_date]
        movement_window:
          { from: "${prior_snapshot_date}", to: "${snapshot_date}" }
        tables:
          - id: tbl_since_last_review
            source: director_workbook
            sheet: Q1 Movement
            max_rows: 12
            sort:
              - { field: Changed On, order: desc }
            columns:
              - {
                  id: account,
                  header: Account,
                  source_column: Account,
                  max_chars: 24,
                }
              - {
                  id: opportunity,
                  header: Opportunity,
                  source_column: Opportunity,
                  max_chars: 28,
                }
              - { id: owner, header: Owner, source_column: Owner }
              - { id: stage, header: Stage, source_column: Stage }
              - { id: movement, header: Movement, source_column: Movement }
              - {
                  id: old_close,
                  header: Old Close,
                  source_column: Old Close,
                  format: yyyy_mm_dd,
                }
              - {
                  id: new_close,
                  header: New Close,
                  source_column: New Close,
                  format: yyyy_mm_dd,
                }
              - {
                  id: changed_on,
                  header: Changed,
                  source_column: Changed On,
                  format: yyyy_mm_dd,
                }
              - {
                  id: arr,
                  header: ARR,
                  source_column: ARR Unweighted (EUR),
                  format: eur_compact,
                }

      - id: q1_promised_delivered
        slide_number: 4
        title: Q1 Promised vs Delivered
        legacy_title_patterns:
          - "^Q1 pipeline opened at EUR.*$"
        purpose: KPI cards comparing Q1 opening pipeline to Q1 closed outcome.
        layout: kpi_cards
        required_takeaway:
          required: true
          max_chars: 200
          template: "Q1 opened at {q1_opening_arr_eur} across {q1_opening_deal_count} deals. Committed (stage 4+): {q1_committed_arr_eur}."
          required_metrics:
            [q1_opening_arr, q1_opening_deal_count, q1_committed_arr]
        required_source_notes: [snapshot_date, territory]
        period: { role: q1, start: "2026-01-01", end: "2026-03-31" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: q1_historical_snapshot,
          }
        definition: opening_pipeline

      - id: q1_forecast_variance
        slide_number: 5
        title: Q1 Forecast Variance
        legacy_title_patterns:
          - "^Q1 Forecast Variance.*$"
        purpose: Variance bridge — opening Q1 pipeline -> final Q1 outcome.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 150
          template: "Q1 pipeline {q1_variance_direction} {q1_variance_arr_eur}; net change {q1_net_change_eur}."
          required_metrics:
            [q1_variance_arr, q1_net_change, q1_variance_direction]
        required_source_notes: [snapshot_date, territory, period]
        period: { role: q1, start: "2026-01-01", end: "2026-03-31" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: q1_historical_snapshot,
          }
        definition: historical_trending_delta
        tables:
          # Displayed as the bucket bridge in the produced deck. Source rows
          # are at opportunity grain in Q1 Snapshot Trend; the named transform
          # collapses them into the 8 executive buckets at runtime. The
          # binding_type tells the resolver to skip per-row column existence
          # checks and instead verify (a) snapshot_roles all resolve and
          # (b) the named transform is registered.
          - id: tbl_q1_forecast_variance_bridge
            binding_type: derived_table
            display_grain: bucket
            source_grain: opportunity
            transform_id: q1_forecast_variance_bridge
            source: director_workbook
            sheet: Q1 Snapshot Trend
            snapshot_roles:
              opening_arr: q1_opening
              latest_arr: q1_latest
              change_at_close: q1_change_to_close
            columns:
              - { id: bucket, header: Bucket, computed: bucket_label }
              - {
                  id: arr_impact,
                  header: ARR Impact,
                  computed: bucket_arr_impact,
                  format: eur_compact,
                }
            rows:
              - {
                  id: initial_q1_pipeline,
                  label: "Initial Q1 pipeline",
                  origin: opening_snapshot,
                }
              - {
                  id: closed_won_removed,
                  label: "Closed Won (out of pipeline)",
                  origin: closed_outcome,
                }
              - {
                  id: closed_lost_removed,
                  label: "Closed Lost (out of pipeline)",
                  origin: closed_outcome,
                }
              - {
                  id: new_deals_added,
                  label: "New deals added",
                  origin: net_inflow,
                }
              - {
                  id: arr_revised_up,
                  label: "ARR revised up",
                  origin: arr_delta_positive,
                }
              - {
                  id: arr_revised_down,
                  label: "ARR revised down",
                  origin: arr_delta_negative,
                }
              - {
                  id: final_q1_pipeline,
                  label: "Final Q1 pipeline",
                  origin: latest_snapshot,
                }
              - { id: net_change, label: "Net change", origin: bridge_total }
          # Supporting evidence at opportunity grain. Not the displayed table —
          # available for drill-through / audit. The binding_type makes the
          # resolver perform direct column-existence checks on this one.
          - id: tbl_q1_forecast_variance_evidence
            binding_type: direct_workbook_table
            display_grain: opportunity
            source_grain: opportunity
            evidence_only: true
            source: director_workbook
            sheet: Q1 Snapshot Trend
            max_rows: 50
            columns:
              - {
                  id: account,
                  header: Account,
                  source_column: Account,
                  max_chars: 24,
                }
              - {
                  id: opportunity,
                  header: Opportunity,
                  source_column: Opportunity,
                  max_chars: 28,
                }
              - {
                  id: opening_arr,
                  header: Opening,
                  snapshot_role: q1_opening,
                  format: eur_compact,
                }
              - {
                  id: latest_arr,
                  header: Latest,
                  snapshot_role: q1_latest,
                  format: eur_compact,
                }
              - {
                  id: change_at_close,
                  header: Change at Close,
                  snapshot_role: q1_change_to_close,
                  format: eur_compact,
                }

      - id: q1_loss_drivers
        slide_number: 6
        title: Q1 Loss Drivers
        legacy_title_patterns:
          - "^\\d+ Q1 .* losses.*$"
        purpose: Two tables — loss reason breakdown + stage reached for losses.
        layout: dual_table
        required_takeaway:
          required: true
          max_chars: 150
          template: "{q1_loss_count} Q1 Land losses, {q1_loss_arr_eur}. {q1_losses_missing_reason} missing reason code."
          required_metrics:
            [q1_loss_count, q1_loss_arr, q1_losses_missing_reason]
        required_source_notes: [snapshot_date, territory, period]
        period: { role: q1, start: "2026-01-01", end: "2026-03-31" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: q1_historical_snapshot,
          }
        definition: closed_outcome
        tables:
          - id: tbl_q1_loss_reasons
            source: director_workbook
            sheet: Won Lost FY26
            filters:
              Type: Land
              Stage: Closed Lost
              Close Date: { period: q1 }
            max_rows: 10
            sort:
              - { field: ARR Unweighted (EUR), order: desc }
            columns:
              - { id: reason, header: Reason, source_column: Reason }
              - { id: count, header: Count, computed: row_count }
              - {
                  id: arr,
                  header: ARR,
                  source_column: ARR Unweighted (EUR),
                  aggregation: sum,
                  format: eur_compact,
                }
          - id: tbl_q1_loss_stage_reached
            source: director_workbook
            sheet: Won Lost FY26
            filters:
              Type: Land
              Stage: Closed Lost
              Close Date: { period: q1 }
            max_rows: 10
            columns:
              - { id: stage, header: Stage Reached, source_column: Stage }
              - { id: count, header: Count, computed: row_count }
              - {
                  id: arr,
                  header: ARR,
                  source_column: ARR Unweighted (EUR),
                  aggregation: sum,
                  format: eur_compact,
                }

      - id: q2_outlook
        slide_number: 7
        title: Q2 Outlook
        legacy_title_patterns:
          - "^Q2 book EUR.*$"
        purpose: KPI cards for Q2 book — unweighted, weighted, deal count.
        layout: kpi_cards
        required_takeaway:
          required: true
          max_chars: 200
          template: "Q2 book {q2_open_arr_unweighted_eur} unweighted, {q2_open_arr_weighted_eur} weighted. {q2_open_deal_count} deals closing Apr-Jun."
          required_metrics:
            [q2_open_arr_unweighted, q2_open_arr_weighted, q2_open_deal_count]
        required_source_notes: [snapshot_date, territory, period]
        period: { role: q2, start: "2026-04-01", end: "2026-06-30" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: current_close_date,
          }
        definition: final_open_pipeline

      - id: q2_deal_readiness
        slide_number: 8
        title: Q2 Deal Readiness
        legacy_title_patterns:
          - "^Q2 .*: \\d+ deals.*$"
        purpose: Per-deal Q2 readiness — days to close, last activity, stage, next step.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 180
          template: "{territory}: {q2_open_deal_count} Q2 deals, {q2_open_arr_unweighted_eur} open ARR. {q2_readiness_summary}."
          required_metrics:
            [q2_open_deal_count, q2_open_arr_unweighted, q2_readiness_summary]
        required_source_notes: [snapshot_date, territory, period]
        period: { role: q2, start: "2026-04-01", end: "2026-06-30" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: current_close_date,
          }
        definition: final_open_pipeline
        tables:
          - id: tbl_q2_deal_readiness
            source: director_workbook
            sheet: Pipeline Open FY26
            filters:
              Type: Land
              Close Date: { period: q2 }
            max_rows: 7
            sort:
              - { field: Close Date, order: asc }
              - { field: ARR Unweighted (EUR), order: desc }
            columns:
              - {
                  id: account,
                  header: Account,
                  source_column: Account,
                  max_chars: 24,
                }
              - {
                  id: opportunity,
                  header: Opportunity,
                  source_column: Opportunity,
                  max_chars: 28,
                }
              - { id: stage, header: Stage, source_column: Stage }
              - {
                  id: close,
                  header: Close,
                  source_column: Close Date,
                  format: yyyy_mm_dd,
                }
              - { id: days, header: Days, computed: days_to_close }
              - {
                  id: arr,
                  header: ARR,
                  source_column: ARR Unweighted (EUR),
                  format: eur_compact,
                }
              - {
                  id: last_activity,
                  header: Last Activity,
                  source_column: Last Activity,
                  joined_from: Activity Volume,
                }
              - { id: readiness, header: Readiness, computed: readiness_status }

      - id: top_open_opportunities
        slide_number: 9
        title: Top Open Opportunities
        legacy_title_patterns:
          - "^Top \\d+ open deals.*$"
        purpose: Top-N open Land deals by unweighted ARR.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 180
          template: "Top {top_n} open deals = {top_n_arr_eur}. {top_account} leads at {top_account_arr_eur}; top 5 = {top_5_share_pct} of this book."
          required_metrics:
            [top_n, top_n_arr, top_account, top_account_arr, top_5_share_pct]
        required_source_notes: [snapshot_date, territory]
        period: { role: open, start: "2026-04-01", end: "2026-09-30" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: current_close_date,
          }
        definition: final_open_pipeline
        tables:
          - id: tbl_top_open_opportunities
            source: director_workbook
            sheet: Pipeline Open FY26
            filters:
              Type: Land
            max_rows: 7
            sort:
              - { field: ARR Unweighted (EUR), order: desc }
            columns:
              - {
                  id: account,
                  header: Account,
                  source_column: Account,
                  max_chars: 28,
                }
              - {
                  id: opportunity,
                  header: Opportunity,
                  source_column: Opportunity,
                  max_chars: 32,
                }
              - { id: owner, header: Owner, source_column: Owner }
              - { id: stage, header: Stage, source_column: Stage }
              - {
                  id: close,
                  header: Close,
                  source_column: Close Date,
                  format: yyyy_mm_dd,
                }
              - {
                  id: arr,
                  header: ARR,
                  source_column: ARR Unweighted (EUR),
                  format: eur_compact,
                }
              - {
                  id: probability,
                  header: Prob %,
                  source_column: Probability %,
                }

      - id: deal_risk_triage
        slide_number: 10
        title: Deal Risk Triage
        legacy_title_patterns:
          - "^Top \\d+ Q2.*Deals at Risk.*$"
        purpose: Top Q2-Q3 deals at risk by Pipeline Inspection score/priority.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 150
          template: "Top {risk_top_n} Q2-Q3 deals at risk, {risk_arr_eur} exposed."
          required_metrics: [risk_top_n, risk_arr]
        required_source_notes: [snapshot_date, territory]
        period: { role: q2_q3, start: "2026-04-01", end: "2026-09-30" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: current_close_date,
          }
        definition: final_open_pipeline
        tables:
          - id: tbl_deal_risk_triage
            source: director_workbook
            sheet: Pipeline Inspection
            filters:
              Close Date: { period: q2_q3 }
            max_rows: 6
            sort:
              - { field: Score, order: desc }
              - { field: ARR Weighted (EUR), order: desc }
            columns:
              - {
                  id: opportunity,
                  header: Opportunity,
                  source_column: Opportunity,
                  max_chars: 32,
                }
              - { id: owner, header: Owner, source_column: Owner }
              - { id: stage, header: Stage, source_column: Stage }
              - {
                  id: forecast_category,
                  header: Forecast,
                  source_column: Forecast Category,
                }
              - {
                  id: arr_weighted,
                  header: Wtd ARR,
                  source_column: ARR Weighted (EUR),
                  format: eur_compact,
                }
              - {
                  id: close,
                  header: Close,
                  source_column: Close Date,
                  format: yyyy_mm_dd,
                }
              - { id: push_count, header: Pushes, source_column: Push Count }
              - { id: score, header: Score, source_column: Score }
              - { id: priority, header: Priority, source_column: Priority }

      - id: owner_coaching
        slide_number: 11
        title: Owner Coaching Priorities
        legacy_title_patterns:
          - "^\\d+ owners carry \\d+ pushes.*$"
        purpose: Owner-level rollup of pushes + open ARR for coaching priorities.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 150
          template: "{coach_owner_count} owners carry {coach_total_pushes} pushes across {coach_total_arr_eur}. Coach in this order."
          required_metrics:
            [coach_owner_count, coach_total_pushes, coach_total_arr]
        required_source_notes: [snapshot_date, territory]
        period: { role: open, start: "2026-04-01", end: "2026-09-30" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: current_close_date,
          }
        definition: final_open_pipeline
        tables:
          - id: tbl_owner_coaching
            source: director_workbook
            sheet: Pipeline Open FY26
            filters:
              Type: Land
            group_by: Owner
            max_rows: 8
            sort:
              - { field: Push Count, order: desc, aggregation: sum }
              - { field: ARR Unweighted (EUR), order: desc, aggregation: sum }
            columns:
              - { id: owner, header: Owner, source_column: Owner }
              - { id: deal_count, header: Deals, computed: row_count }
              - {
                  id: total_arr,
                  header: ARR,
                  source_column: ARR Unweighted (EUR),
                  aggregation: sum,
                  format: eur_compact,
                }
              - {
                  id: total_pushes,
                  header: Pushes,
                  source_column: Push Count,
                  aggregation: sum,
                }
              - {
                  id: avg_pushes,
                  header: Avg Push,
                  source_column: Push Count,
                  aggregation: mean,
                  format: number_1dp,
                }

      - id: pushed_deals
        slide_number: 12
        title: Pushed Deals
        legacy_title_patterns:
          - "^\\d+ open deals pushed.*$"
        purpose: Pushed-deal headline + Salesforce link for live drill.
        layout: kpi_cards_with_link
        required_takeaway:
          required: true
          max_chars: 180
          template: "{pushed_deal_count} open deals pushed. {pushed_top_owner} owns {pushed_top_owner_count} of the most-pushed deals; pattern review."
          required_metrics:
            [pushed_deal_count, pushed_top_owner, pushed_top_owner_count]
        required_source_notes: [snapshot_date, territory, salesforce_drill_link]
        required_links:
          - id: salesforce_pushed_deals
            label: Open in Salesforce
            kind: salesforce_list_view

      - id: q1_slippage
        slide_number: 13
        title: Q1 Slippage
        legacy_title_patterns:
          - "^\\d+ deals slipped out of Q1.*$"
        purpose: Deals that slipped out of Q1 + their post-slip behavior.
        layout: table_with_takeaway
        required_takeaway:
          required: true
          max_chars: 150
          template: "{slipped_deal_count} deals slipped out of Q1 ({slipped_arr_eur}). {pushed_since_count} pushed since."
          required_metrics:
            [slipped_deal_count, slipped_arr, pushed_since_count]
        required_source_notes: [snapshot_date, territory]
        period: { role: q1, start: "2026-01-01", end: "2026-03-31" }
        population:
          {
            type: Land,
            territory: "${territory}",
            close_date_scope: q1_original_close_date,
          }
        definition: historical_trending_delta
        tables:
          - id: tbl_q1_slippage
            source: director_workbook
            sheet: Q1 Movement
            filters:
              Movement: { in: [Push, Slip] }
            max_rows: 12
            sort:
