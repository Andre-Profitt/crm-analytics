  monthly_director_bundle_contract:
    path: config/monthly_director_bundle_contract.json
    payload:
      schema_version: monthly_platform.director_bundle_contract.v1
      description: Dataset coverage contract for DirectorBundle artifacts built from monthly Salesforce source bundles. A
        dataset is either source-backed today or explicitly optional-empty until a source requirement is added.
      datasets:
      - dataset: pipeline_open
        policy: source_backed
        required_for_publish: true
        source_contract_keys:
        - pipeline_open
        source_requirement_ids:
        - sd_pipeline_open
        rationale: APAC pilot is now backed by a dedicated monthly Opportunity list view with unweighted ARR and Probability.
          Other territories must add equivalent source IDs before full-run promotion.
      - dataset: won_lost
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Legacy SOQL-backed closed-deal dataset. Add a monthly source requirement before using it for publish claims.
      - dataset: renewals
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Renewal detail is not part of the current report-first source contract.
      - dataset: approvals
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Approval detail is not part of the current report-first source contract.
      - dataset: pi_current
        policy: source_backed
        required_for_publish: true
        source_contract_keys:
        - pi_current
        source_requirement_ids:
        - sd_pipeline_inspection
        rationale: Current-quarter Pipeline Inspection list view is the canonical monthly pipeline display source.
      - dataset: pi_forward
        policy: source_backed
        required_for_publish: true
        source_contract_keys:
        - pi_forward
        source_requirement_ids:
        - sd_pipeline_inspection
        rationale: Forward-quarter Pipeline Inspection list view supports fallback when current-quarter active pipeline is
          empty.
      - dataset: activity
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Activity signals remain a legacy SOQL enrichment until a source-backed requirement lands.
      - dataset: commit_items
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Commit items are not part of the current monthly report-first source contract.
      - dataset: stage_events
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Field-history stage events are not source-backed by the current specified reports.
      - dataset: forecast_category_events
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Field-history forecast-category events are not source-backed by the current specified reports.
      - dataset: close_date_events
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Field-history close-date events are not source-backed by the current specified reports.
      - dataset: movement_prior
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Prior-quarter movement logic should be rebuilt from historical-trending/field-history requirements before
          use.
      - dataset: movement_current
        policy: optional_empty
        required_for_publish: false
        source_contract_keys: []
        source_requirement_ids: []
        rationale: Current-quarter movement logic should be rebuilt from historical-trending/field-history requirements before
          use.
      - dataset: snapshot_trend
        policy: source_backed
        required_for_publish: true
        source_contract_keys:
        - snapshot_trend
        source_requirement_ids:
        - sd_historical_trending
        rationale: Historical Trending reports are the canonical source for snapshot movement inputs.
