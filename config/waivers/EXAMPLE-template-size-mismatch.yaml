# Example waiver demonstrating the Track K format.
#
# Real waivers go alongside this file in config/waivers/<WV-id>.yaml.
# Each waiver is a single YAML document with the fields below.
#
# This file is intentionally a no-op example — it carries an ID,
# expiry, and owner, but its `gate` won't actually fire on the
# canonical contract (template size matches expected). Listed here
# so the waiver loader has at least one fixture to validate against.

id: WV-2026-04-001
